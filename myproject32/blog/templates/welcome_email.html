<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Template</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f4f4f4;
    font-family:Arial, Helvetica, sans-serif;
}

.wrapper{
    width:100%;
    padding:40px 0;
}

.container{
    max-width:600px;
    margin:auto;
    background:#ffffff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.header{
    background:#0d6efd;
    color:#fff;
    text-align:center;
    padding:30px;
}

.header h1{
    margin:0;
}

.content{
    padding:30px;
    color:#555;
    line-height:1.8;
}

.btn{
    display:inline-block;
    background:#0d6efd;
    color:#fff !important;
    text-decoration:none;
    padding:12px 25px;
    border-radius:5px;
    margin-top:20px;
}

.footer{
    background:#f8f9fa;
    text-align:center;
    padding:20px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="wrapper">

    <div class="container">

        <div class="header">
            <h1>Welcome {{ username }}!</h1>
        </div>

        <div class="content">
            <h2>Hello {{username}}</h2>

            <p>
                Thank you for joining our platform.
                We are excited to have you with us.
            </p>

            <p>
                Click the button below to get started.
            </p>

            <a href="#" class="btn">Get Started</a>

            <p>
                If you have any questions, simply reply to this email.
            </p>

            <p>
                Best Regards,<br>
                <strong>Your Company</strong>
            </p>

        </div>

        <div class="footer">
            © 2026 Your Company. All Rights Reserved.
        </div>

    </div>

</div>

</body>
</html>
