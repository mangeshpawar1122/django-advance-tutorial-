{% extends "blog/base.html" %}

{% block content %}

<h2>Are you sure you want to delete "{{ object.title }}"?</h2>

<form method="POST" class="mt-3">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Yes, Delete
    </button>

    <a href="{% url 'post_detail' object.pk %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
